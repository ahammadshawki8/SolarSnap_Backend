services:
  - type: web
    name: solarsnap-backend
    env: python
    buildCommand: |
      pip install -r requirements.txt
      python render_deploy.py
    startCommand: gunicorn --bind 0.0.0.0:$PORT --workers 2 --timeout 30 run:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.8
      - key: FLASK_ENV
        value: production
      - key: FLASK_DEBUG
        value: False
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: "*"
      - key: UPLOAD_FOLDER
        value: uploads
      - key: MAX_CONTENT_LENGTH
        value: 52428800
      - key: LOG_LEVEL
        value: INFO

databases:
  - name: solarsnap-db
    databaseName: solarsnap
    user: solarsnap_user